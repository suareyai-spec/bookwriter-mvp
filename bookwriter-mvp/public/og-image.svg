<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  
  <!-- Plot text -->
  <text x="380" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="800" fill="#ffffff">Plot</text>
  <!-- Ghost text -->
  <text x="700" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="800" fill="#6666ff">Ghost</text>
  
  <!-- Tagline -->
  <text x="600" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#9ca3af" text-anchor="middle">AI-Powered Book &amp; Content Generator</text>
  
  <!-- Features line -->
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6b7280" text-anchor="middle">Books · Scripts · Theses · Courses · Comics</text>
  
  <!-- URL -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#4b5563" text-anchor="middle">plotghost.ai</text>
  
  <!-- Accent line -->
  <rect x="500" y="470" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>
