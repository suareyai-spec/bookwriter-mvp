<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narevo API — Sign Up</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;line-height:1.6;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .card{background:#111118;border:1px solid #222;border-radius:12px;padding:40px;width:100%;max-width:420px}
  h1{font-size:1.6rem;color:#fff;margin-bottom:4px}
  .sub{color:#888;margin-bottom:24px;font-size:.9rem}
  label{display:block;color:#aaa;font-size:.85rem;margin-bottom:4px;margin-top:16px}
  input,select{width:100%;padding:10px 12px;background:#0a0a0f;border:1px solid #333;border-radius:6px;color:#fff;font-size:.95rem}
  input:focus,select:focus{outline:none;border-color:#60a5fa}
  .btn{width:100%;padding:12px;background:#60a5fa;color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:24px}
  .btn:hover{opacity:.85}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .error{color:#f87171;font-size:.85rem;margin-top:8px;display:none}
  a{color:#60a5fa;text-decoration:none}
  .footer{text-align:center;margin-top:16px;font-size:.85rem;color:#888}
</style>
</head>
<body>
<div class="card">
  <h1>Create Account</h1>
  <p class="sub">Get your API key and start building.</p>
  <div id="error" class="error"></div>
  <form id="form">
    <label>Name</label>
    <input type="text" id="name" placeholder="Your name">
    <label>Email *</label>
    <input type="email" id="email" required placeholder="you@company.com">
    <label>Password *</label>
    <input type="password" id="password" required placeholder="Min 8 characters" minlength="8">
    <label>Plan</label>
    <select id="plan">
      <option value="starter">Starter — $29/mo</option>
      <option value="growth">Growth — $79/mo</option>
      <option value="agency">Agency — $199/mo</option>
    </select>
    <button type="submit" class="btn" id="submit">Sign Up & Subscribe</button>
  </form>
  <div class="footer">Already have an account? <a href="/login">Log in</a></div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  if (params.get('plan')) document.getElementById('plan').value = params.get('plan');

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit');
    const err = document.getElementById('error');
    btn.disabled = true; btn.textContent = 'Creating account...'; err.style.display = 'none';

    try {
      const res = await fetch('/api/customers/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      localStorage.setItem('token', data.token);
      localStorage.setItem('apiKey', data.apiKey);

      // Now create checkout
      btn.textContent = 'Redirecting to payment...';
      const plan = document.getElementById('plan').value;
      const checkout = await fetch('/api/billing/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${data.token}` },
        body: JSON.stringify({ plan }),
      });
      const checkoutData = await checkout.json();
      if (!checkout.ok) throw new Error(checkoutData.error);

      window.location.href = checkoutData.checkoutUrl;
    } catch (e) {
      err.textContent = e.message; err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign Up & Subscribe';
    }
  });
</script>
</body>
</html>
